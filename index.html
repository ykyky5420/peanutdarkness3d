<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Peanut Darkness 3D - 영원의 기록과 빛</title>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* UI 스타일은 원본의 아름다움을 그대로 간직합니다 */
    body { 
        margin: 0; padding: 0; background-color: #000; overflow: hidden; 
        font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
        touch-action: none; overscroll-behavior: none;
        user-select: none; -webkit-user-select: none;
    }
    #renderCanvas { width: 100%; height: 100%; touch-action: none; outline: none; }
    
    @keyframes titleGlow { 0% { text-shadow: 0 0 10px rgba(212, 160, 23, 0.2); } 50% { text-shadow: 0 0 30px rgba(212, 160, 23, 0.8), 0 0 60px rgba(212, 160, 23, 0.5); } 100% { text-shadow: 0 0 10px rgba(212, 160, 23, 0.2); } }
    .ui-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 15px; color: white; background: rgba(10, 10, 15, 0.95); padding: 50px; border-radius: 20px; border: 1px solid #333; z-index: 10;  box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
    h1 { font-size: 55px; color: #d4a017; margin: 0 0 35px 0; letter-spacing: 10px; animation: titleGlow 3s ease-in-out infinite alternate; }
    
    .input-group { display: flex; flex-direction: column; width: 280px; gap: 8px; }
    .input-group label { font-size: 14px; color: #888; margin-left: 5px; }
    input { padding: 14px; border-radius: 10px; border: 1px solid #444; background: #111; color: white; font-size: 16px; width: 100%; box-sizing: border-box; text-align: center;}
    
    .name-gen-box { display: flex; gap: 5px; width: 100%; }
    .name-gen-box input { flex-grow: 1; }
    .name-gen-box button { margin: 0; padding: 0 15px; width: auto; font-size: 20px; border-radius: 10px; background: #333; color: #d4a017; border: 1px solid #444; cursor: pointer; transition: 0.3s; }
    
    .btn-start { background: #d4a017; color: #000; font-weight: bold; padding: 18px 45px; border-radius: 10px; border: none; font-size: 20px; cursor: pointer; margin-top: 20px; width: 280px; }
    
    #dev-ui { position: absolute; top: 20px; left: 20px; background: rgba(15, 15, 20, 0.9); border: 1px solid #d4a017; padding: 20px; border-radius: 12px; color: white; display: none; flex-direction: column; gap: 15px; z-index: 100; }
    #overlay-ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 15px; z-index: 5; display: none; pointer-events: none;}
    
    .answer-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; z-index: 20; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50px; border: 1px solid #d4a017; }
    .answer-container input { padding: 8px 20px; border-radius: 20px; border: none; background: #111; color: white; width: 150px; text-align: center; }
    .answer-container button { padding: 8px 20px; font-size: 14px; border-radius: 20px; background: #d4a017; color: black; font-weight:bold; cursor:pointer; border:none;}
  </style>
</head>
<body>

  <canvas id="renderCanvas"></canvas>

  <div id="lobby-ui" class="ui-container">
    <h1>Peanut Darkness</h1>
    <div class="input-group">
      <label>방 코드</label>
      <div class="name-gen-box">
        <input type="text" id="roomCode" placeholder="예: 1234" maxlength="4">
        <button onclick="generateRandomRoomCode()">🔄</button>
      </div>
    </div>
    <div class="input-group">
      <label>탐험가의 이름</label>
      <div class="name-gen-box">
        <input type="text" id="pName" placeholder="이름을 새겨주세요">
        <button onclick="generateRandomName()">🔄</button>
      </div>
    </div>
    <button class="btn-start" onclick="startGame()">어둠 속으로 뛰어들기</button>
  </div>

  <div id="dev-ui">
    <h3>🛠 창조주의 시선</h3>
    <button onclick="toggleDevVision()" style="margin-bottom:10px; padding:8px;">맵 전체 밝히기 토글</button>
  </div>

  <div id="overlay-ui">
    <div id="status-text"></div>
  </div>

  <div id="answer-ui" class="answer-container">
    <input type="text" id="ansInput" placeholder="진실의 이름을 부르세요">
    <button onclick="submitAnswer()">외치기</button>
  </div>

  <script>
    const socket = io(); 
    
    // --- 1. 2D 논리 좌표계 (서버 호환성 유지) ---
    const MAP_RADIUS = 4000; const MAP_CENTER = 4000; const MAP_SIZE = MAP_RADIUS * 2;
    let serverWorld = { players: {}, items: [], enemies: [] };
    let playerX = MAP_CENTER, playerY = MAP_CENTER + MAP_RADIUS - 80; 
    let playerDir = -Math.PI / 2;
    let lanternOn = true, battery = 100;
    let fullVision = false, devModeActive = false;
    let gameState = 'LOBBY';
    let activeKeys = {};

    // --- 2. Babylon.js 3D 월드 구축 ---
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true);
    
    let scene, mainCamera, minimapCamera;
    let globalLight, playerLantern;
    let playerMesh;
    let otherPlayersMeshes = {};
    
    function createScene() {
        scene = new BABYLON.Scene(engine);
        scene.clearColor = new BABYLON.Color4(0.02, 0.02, 0.03, 1); // 심연의 색

        // 은은한 전체 환경광 (어둠 모드에서는 아주 약하게, 창조주 모드에서는 밝게)
        globalLight = new BABYLON.HemisphericLight("globalLight", new BABYLON.Vector3(0, 1, 0), scene);
        globalLight.intensity = 0.05; 

        // [탑뷰 카메라] 플레이어를 수직으로 내려다보는 시선
        mainCamera = new BABYLON.TargetCamera("mainCam", new BABYLON.Vector3(0, 300, 0), scene);
        mainCamera.setTarget(BABYLON.Vector3.Zero());
        
        // [미니맵 카메라] 직교 투영(Orthographic)으로 우측 상단에 배치
        minimapCamera = new BABYLON.TargetCamera("minimapCam", new BABYLON.Vector3(0, 5000, 0), scene);
        minimapCamera.mode = BABYLON.Camera.ORTHOGRAPHIC_CAMERA;
        let mapScale = 4000;
        minimapCamera.orthoLeft = -mapScale; minimapCamera.orthoRight = mapScale;
        minimapCamera.orthoTop = mapScale; minimapCamera.orthoBottom = -mapScale;
        minimapCamera.setTarget(BABYLON.Vector3.Zero());
        minimapCamera.viewport = new BABYLON.Viewport(0.75, 0.75, 0.22, 0.22); // 우측 상단 구석
        
        // 두 카메라 모두 활성화
        scene.activeCameras.push(mainCamera);
        scene.activeCameras.push(minimapCamera);

        // 안개 설정 (빛이 닿지 않는 거리는 먹먹하게 처리)
        scene.fogMode = BABYLON.Scene.FOGMODE_EXP;
        scene.fogColor = scene.clearColor;
        scene.fogDensity = 0.003;

        // 바닥 (어두운 토양)
        const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: MAP_SIZE, height: MAP_SIZE}, scene);
        const groundMat = new BABYLON.StandardMaterial("gMat", scene);
        groundMat.diffuseColor = new BABYLON.Color3(0.05, 0.05, 0.05);
        groundMat.specularColor = new BABYLON.Color3(0, 0, 0); // 반사 제거
        ground.material = groundMat;

        // 플레이어 아바타 (발광하는 구체)
        playerMesh = BABYLON.MeshBuilder.CreateSphere("myPlayer", {diameter: 20}, scene);
        const pMat = new BABYLON.StandardMaterial("pMat", scene);
        pMat.emissiveColor = new BABYLON.Color3(1, 0.9, 0.6); // 따뜻한 빛
        playerMesh.material = pMat;

        // 플레이어 랜턴 (SpotLight로 시야각을 3D로 구현)
        playerLantern = new BABYLON.SpotLight("lantern", 
            new BABYLON.Vector3(0, 20, 0), // 위치
            new BABYLON.Vector3(0, -0.5, 1), // 방향 (앞과 아래쪽 대각선)
            Math.PI / 1.5, 10, scene); // 시야각과 빛의 감소율
        playerLantern.intensity = 2.0;
        playerLantern.parent = playerMesh; // 플레이어를 따라다님

        return scene;
    }

    scene = createScene();

    // --- 3. 게임 루프 및 좌표 동기화 ---
    engine.runRenderLoop(() => {
        if (gameState === 'PLAY') {
            handleInput(); // 기존 2D 로직 기반 이동
            
            // 2D 논리 좌표 (MAP_CENTER 기준)를 3D 공간(0,0 기준)으로 변환
            // Babylon.js는 왼손 좌표계이므로 Y축 맵핑을 Z축으로 변환합니다.
            let renderX = playerX - MAP_CENTER;
            let renderZ = -(playerY - MAP_CENTER); 

            // 플레이어 3D 위치 및 회전 업데이트
            playerMesh.position.x = renderX;
            playerMesh.position.z = renderZ;
            playerMesh.rotation.y = -playerDir + Math.PI/2; 

            // 카메라가 플레이어를 부드럽게 따라가도록
            mainCamera.position.x = renderX;
            mainCamera.position.z = renderZ;
            minimapCamera.position.x = renderX;
            minimapCamera.position.z = renderZ;

            // 랜턴 배터리 시각화 반영
            if(lanternOn) {
                battery -= 0.04; if(battery < 0) battery = 0;
                playerLantern.intensity = (battery / 100) * 2.0;
            } else {
                playerLantern.intensity = 0;
            }

            // 타 플레이어 렌더링 동기화
            updateOtherPlayers();
            updateOverlayUI();
            
            // 서버로 내 위치 전송
            socket.emit('move', { x: playerX, y: playerY, dir: playerDir, lantern: lanternOn });
        }
        scene.render();
    });

    window.addEventListener("resize", () => engine.resize());

    // --- 4. 기타 유틸 및 제어 로직 (기존 로직 보존) ---
    function startGame() {
        const room = document.getElementById('roomCode').value;
        const name = document.getElementById('pName').value;
        if(!name || !room) return alert("방 코드와 이름을 입력하세요.");
        
        socket.emit('join', { name: name, room: room });
        gameState = 'PLAY';
        document.getElementById('lobby-ui').style.display = 'none';
        document.getElementById('answer-ui').style.display = 'flex';
        document.getElementById('overlay-ui').style.display = 'block';
        
        document.getElementById("renderCanvas").focus();
    }

    function toggleDevVision() {
        fullVision = !fullVision;
        if(fullVision) {
            globalLight.intensity = 1.0; // 맵 전체를 대낮처럼 밝힘
            scene.fogDensity = 0;        // 안개 제거
        } else {
            globalLight.intensity = 0.05;
            scene.fogDensity = 0.003;
        }
    }

    // 간단한 이동 로직 (기존 isColliding 등 물리 엔진은 유지됨을 가정)
    function handleInput() {
        let dx = 0, dy = 0;
        let speed = 7;
        if (activeKeys['arrowleft'] || activeKeys['a']) dx -= speed;
        if (activeKeys['arrowright'] || activeKeys['d']) dx += speed;
        if (activeKeys['arrowup'] || activeKeys['w']) dy -= speed;
        if (activeKeys['arrowdown'] || activeKeys['s']) dy += speed;

        if (dx !== 0 || dy !== 0) {
            playerDir = Math.atan2(dy, dx);
            playerX += dx; 
            playerY += dy;
            // * 이곳에 기존 2D 캔버스 픽셀 기반 isColliding() 체크를 유지하시면 됩니다.
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'z' || e.key === 'Z') lanternOn = !lanternOn;
        if (e.altKey && e.key === 'a') {
            devModeActive = !devModeActive;
            document.getElementById('dev-ui').style.display = devModeActive ? 'flex' : 'none';
        }
        activeKeys[e.key.toLowerCase()] = true;
    });
    window.addEventListener('keyup', (e) => activeKeys[e.key.toLowerCase()] = false; );

    function updateOtherPlayers() {
        for (let id in serverWorld.players) {
            if (id === socket.id) continue;
            let op = serverWorld.players[id];
            
            if(!otherPlayersMeshes[id]) {
                let m = BABYLON.MeshBuilder.CreateCylinder("op_"+id, {height: 20, diameter: 20}, scene);
                let mat = new BABYLON.StandardMaterial("opMat", scene);
                mat.emissiveColor = BABYLON.Color3.FromHexString(op.color || "#FFFFFF");
                m.material = mat;
                otherPlayersMeshes[id] = m;
            }
            
            // 위치 보정 (2D -> 3D)
            otherPlayersMeshes[id].position.x = op.x - MAP_CENTER;
            otherPlayersMeshes[id].position.z = -(op.y - MAP_CENTER);
        }
    }

    function updateOverlayUI() {
        document.getElementById('status-text').innerHTML = `
            배터리: ${Math.floor(battery)}% <br>
            랜턴: ${lanternOn ? '켜짐' : '꺼짐'} (Z키)
        `;
    }

    socket.on('worldUpdate', (data) => { serverWorld = data; });

    // 임시 더미 헬퍼 (로비 진입용)
    const adjectives = ["조용한", "빛나는"]; const nouns = ["그림자", "별빛"];
    function generateRandomRoomCode() { document.getElementById('roomCode').value = "1234"; }
    function generateRandomName() { document.getElementById('pName').value = "빛나는 그림자"; }
    window.onload = () => { generateRandomName(); generateRandomRoomCode(); };
  </script>
</body>
</html>
